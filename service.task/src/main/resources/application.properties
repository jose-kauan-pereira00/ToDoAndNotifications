spring.application.name=service-task
server.port=8081

spring.cloud.config.uri=http://localhost:8888/config //service-main
spring.config.import=optional:configserver:http://localhost:8888/config

eureka.client.service-url.defaultZone=http://localhost:8888/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=service-task

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

